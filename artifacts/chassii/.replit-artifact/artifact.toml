kind = "web"
previewPath = "/"
title = "CHASSII"
version = "1.0.0"
id = "artifacts/chassii"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23999

[services.development]
run = "pnpm --filter @workspace/chassii run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chassii", "run", "build" ]
publicDir = "artifacts/chassii/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23999"
BASE_PATH = "/"
